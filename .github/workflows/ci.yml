name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GMP / Boost / CMake / build tools
        run: |
          sudo apt-get update
          # `clang` + `libc++-dev` + `libc++abi-dev` let SoPlex and the
          # bridge compile against libc++, matching the libc++abi.a
          # Lake's link template pulls from Lean's bundled toolchain.
          sudo apt-get install -y \
            cmake build-essential ninja-build clang \
            libgmp-dev libgmpxx4ldbl libboost-dev \
            libc++-dev libc++abi-dev \
            zstd

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build SoPlex
        run: ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          lake build verify-tests
          ./.lake/build/bin/verify-tests

      - name: Build Lean targets
        run: lake build LeanSoplex soplex-smoke

      - name: Run smoke executable
        run: |
          set +e
          ./.lake/build/bin/soplex-smoke > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc

  linux-asan:
    name: Linux ASan/UBSan
    runs-on: ubuntu-latest
    # Lands `true` while the job stabilises (per issue #21: "can land as
    # `true` initially while flakes are shaken out"). Flip to `false` to
    # make findings block merge once the job has been green for a while.
    continue-on-error: true
    env:
      # `scripts/build-soplex.sh` reads this to instrument SoPlex's own
      # .o files; the lakefile's `get_config?` opt-in handles the bridge
      # and exe link. Both must be set for a consistent sanitized build.
      LEAN_SOPLEX_SANITIZE: "1"
      # LSan would otherwise report Lean-runtime allocations that
      # legitimately survive process exit. ASan's UAF / OOB checks are
      # the value we want here.
      ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1:symbolize=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GMP / Boost / CMake / build tools
        run: |
          sudo apt-get update
          # Same package set as the plain Linux job. `llvm-symbolizer`
          # (from `llvm`) gives ASan/UBSan readable stack traces.
          sudo apt-get install -y \
            cmake build-essential ninja-build clang llvm \
            libgmp-dev libgmpxx4ldbl libboost-dev \
            libc++-dev libc++abi-dev \
            zstd

      - name: Install clang-19 + compiler-rt from apt.llvm.org
        run: |
          # Ubuntu's distro clang-19 ships compiler-rt in the *legacy*
          # layout (`lib/linux/libclang_rt.asan-x86_64.a`), while Lean's
          # bundled clang-19 was built with
          # `LLVM_ENABLE_PER_TARGET_RUNTIME_DIR=ON` so it looks for the
          # *per-target* layout (`lib/x86_64-unknown-linux-gnu/
          # libclang_rt.asan_static.a`). The two layouts decompose
          # compiler-rt differently — the filenames are not
          # mechanically derivable from each other. `apt.llvm.org`
          # publishes upstream LLVM builds which use the per-target
          # layout, matching what Lean's clang expects.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          sudo apt-get install -y libclang-rt-19-dev

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Plant compiler-rt sanitizer archives into Lean's clang
        shell: bash
        run: |
          set -euo pipefail
          # Lean's bundled clang-19 ships *without* the compiler-rt
          # archives ASan/UBSan need at link time.  Symlink the
          # apt.llvm.org-installed copies into the per-target
          # directory Lean's clang looks at.  We discover the source
          # dir by searching for `libclang_rt.asan_static.a` — only
          # the per-target layout publishes that filename, so its
          # location tells us we found the right install.
          LEAN_PREFIX="$(lean --print-prefix)"
          DEST="$LEAN_PREFIX/lib/clang/19/lib/x86_64-unknown-linux-gnu"
          SRC_FILE="$(find /usr/lib -name 'libclang_rt.asan_static.a' -path '*/clang/19/*' 2>/dev/null | head -1)"
          if [ -z "$SRC_FILE" ]; then
            echo "ERROR: per-target compiler-rt for clang-19 not found." >&2
            echo "Files actually installed:" >&2
            dpkg -L libclang-rt-19-dev | head -80 >&2
            exit 1
          fi
          SRC="$(dirname "$SRC_FILE")"
          echo "compiler-rt source: $SRC"
          echo "lean clang expects: $DEST"
          mkdir -p "$DEST"
          for f in "$SRC"/libclang_rt.*; do
            ln -sfn "$f" "$DEST/$(basename "$f")"
          done
          ls -la "$DEST" | head -20

      - name: Set UBSAN_OPTIONS with workspace-rooted suppressions
        run: |
          echo "UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1:abort_on_error=1:suppressions=$GITHUB_WORKSPACE/tests/sanitizer-suppressions.supp" >> "$GITHUB_ENV"

      - name: Build SoPlex (sanitized)
        run: ./scripts/build-soplex.sh

      - name: Build and run verify-tests (sanitized)
        run: |
          lake build -Ksanitize=1 verify-tests
          ./.lake/build/bin/verify-tests

      - name: Build sanitized Lean targets
        run: |
          lake build -Ksanitize=1 LeanSoplex soplex-smoke solve-exact-tests

      - name: Run soplex-smoke under ASan/UBSan
        run: |
          set +e
          ./.lake/build/bin/soplex-smoke > /tmp/smoke.out 2>&1
          rc=$?
          tail -40 /tmp/smoke.out
          exit $rc

      - name: Run solve-exact-tests under ASan/UBSan
        run: |
          set +e
          ./.lake/build/bin/solve-exact-tests > /tmp/solve.out 2>&1
          rc=$?
          tail -40 /tmp/solve.out
          exit $rc

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GMP / Boost / build tools (Homebrew)
        run: |
          brew install gmp boost cmake ninja zstd

      # The lakefile hard-codes the Command Line Tools SDK path so that
      # configuration is pure (no IO at lake load time). macOS runners
      # ship Xcode but not always with CLT mounted at
      # /Library/Developer/CommandLineTools, so we ensure that path
      # exists by symlinking the active SDK there.
      - name: Ensure CLT SDK symlink
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          target="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          echo "active sdk: $sdk_path"
          if [ ! -d "$target" ]; then
            sudo mkdir -p "$(dirname "$target")"
            sudo ln -sfn "$sdk_path" "$target"
          fi
          ls -ld "$target"

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build SoPlex
        run: ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          lake build verify-tests
          ./.lake/build/bin/verify-tests

      - name: Build Lean targets
        run: lake build LeanSoplex soplex-smoke

      - name: Run smoke executable
        run: |
          set +e
          ./.lake/build/bin/soplex-smoke > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc

  windows:
    name: Windows (MSYS2 / mingw-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-boost
            git
            curl
            unzip

      - name: Install elan and Lean toolchain
        run: |
          set -e
          curl -sSf -L https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-pc-windows-msvc.zip -o elan-init.zip
          unzip -q elan-init.zip
          MSYS2_ARG_CONV_EXCL="*" ./elan-init.exe -y --default-toolchain none --no-modify-path
          ELAN_DIR_MSYS="$(cygpath -u "$USERPROFILE")/.elan"
          ls -la "$ELAN_DIR_MSYS/bin" || (echo "elan install did not produce expected files" && exit 1)
          export PATH="$ELAN_DIR_MSYS/bin:$MINGW_PREFIX/bin:$PATH"
          ./scripts/install-toolchain.sh
          echo "$ELAN_DIR_MSYS/bin" > .elan-path
          echo "$MINGW_PREFIX/bin" >> .elan-path

      - name: Stage mingw runtime libraries
        run: |
          set -e
          ./scripts/stage-mingw-libs.sh
          ls -la vendor/mingw-libs/

      - name: Build SoPlex
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake build verify-tests
          ./.lake/build/bin/verify-tests.exe

      - name: Build LeanSoplex and run smoke executable
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake build LeanSoplex soplex-smoke

          set +e
          ./.lake/build/bin/soplex-smoke.exe > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc
